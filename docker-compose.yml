services:
  db:
    image: postgres:16-alpine
    container_name: sociallead_fb_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sociallead_fb}
      POSTGRES_USER: ${POSTGRES_USER:-sociallead}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sociallead_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sociallead} -d ${POSTGRES_DB:-sociallead_fb}"]
      interval: 10s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sociallead_fb_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://sociallead:sociallead_password@db:5432/sociallead_fb}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./backend/data:/app/data
    depends_on:
      db:
        condition: service_healthy
    shm_size: "1gb"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
    container_name: sociallead_fb_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
